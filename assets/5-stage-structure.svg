<svg xmlns="http://www.w3.org/2000/svg" width="820" height="792" viewBox="0 0 820 792" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="820" height="792" rx="16" fill="#0d1117"/>
  <text x="410" y="44" text-anchor="middle" fill="#e6edf3" font-size="26" font-weight="700">The 5-Stage Prompt Structure</text>
  <text x="410" y="70" text-anchor="middle" fill="#8b949e" font-size="14">Mx-Shell&#8217;s skeleton behind &#8220;Zombie Scavenger&#8221; &#183; order matters</text>

  <!-- Stage 1 -->
  <g>
    <rect x="40" y="96" width="740" height="116" rx="12" fill="#161b22" stroke="#ff7a18" stroke-width="1.5"/>
    <circle cx="92" cy="154" r="26" fill="#ff7a18"/>
    <text x="92" y="163" text-anchor="middle" fill="#0d1117" font-size="26" font-weight="700">1</text>
    <text x="140" y="142" fill="#e6edf3" font-size="19" font-weight="700">Core theme</text>
    <text x="140" y="170" fill="#adbac7" font-size="14.5">3&#8211;6 style tags separated by &#8220;|&#8221;</text>
    <text x="140" y="192" fill="#6e7681" font-size="13" font-style="italic">atom-punk | post-apoc | cinematic | hyperreal | no game-CG feel</text>
  </g>

  <!-- arrow -->
  <path d="M410 212 L410 228" stroke="#30363d" stroke-width="2"/>
  <path d="M404 224 L410 232 L416 224 Z" fill="#30363d"/>

  <!-- Stage 2 -->
  <g>
    <rect x="40" y="236" width="740" height="116" rx="12" fill="#161b22" stroke="#16a3a3" stroke-width="1.5"/>
    <circle cx="92" cy="294" r="26" fill="#16a3a3"/>
    <text x="92" y="303" text-anchor="middle" fill="#0d1117" font-size="26" font-weight="700">2</text>
    <text x="140" y="282" fill="#e6edf3" font-size="19" font-weight="700">Character &amp; scene</text>
    <text x="140" y="310" fill="#adbac7" font-size="14.5">Face / Clothing / Scene &#8212; three lines</text>
    <text x="140" y="332" fill="#6e7681" font-size="13" font-style="italic">100% face-preserved &#183; material-first &#183; active environment</text>
  </g>

  <path d="M410 352 L410 368" stroke="#30363d" stroke-width="2"/>
  <path d="M404 364 L410 372 L416 364 Z" fill="#30363d"/>

  <!-- Stage 3 -->
  <g>
    <rect x="40" y="376" width="740" height="116" rx="12" fill="#161b22" stroke="#ff7a18" stroke-width="1.5"/>
    <circle cx="92" cy="434" r="26" fill="#ff7a18"/>
    <text x="92" y="443" text-anchor="middle" fill="#0d1117" font-size="26" font-weight="700">3</text>
    <text x="140" y="422" fill="#e6edf3" font-size="19" font-weight="700">Atmosphere &amp; quality</text>
    <text x="140" y="450" fill="#adbac7" font-size="14.5">Real camera + lens model / color tone / film grain</text>
    <text x="140" y="472" fill="#6e7681" font-size="13" font-style="italic">IMAX + Panavision C-series, 35mm, f/4 &#8212; the key trick</text>
  </g>

  <path d="M410 492 L410 508" stroke="#30363d" stroke-width="2"/>
  <path d="M404 504 L410 512 L416 504 Z" fill="#30363d"/>

  <!-- Stage 4 -->
  <g>
    <rect x="40" y="516" width="740" height="116" rx="12" fill="#161b22" stroke="#16a3a3" stroke-width="1.5"/>
    <circle cx="92" cy="574" r="26" fill="#16a3a3"/>
    <text x="92" y="583" text-anchor="middle" fill="#0d1117" font-size="26" font-weight="700">4</text>
    <text x="140" y="562" fill="#e6edf3" font-size="19" font-weight="700">Camera rules</text>
    <text x="140" y="590" fill="#adbac7" font-size="14.5">Single-shot or multi / angle / breath-like float</text>
    <text x="140" y="612" fill="#6e7681" font-size="13" font-style="italic">&#8220;extremely subtle, breath-like camera float throughout&#8221;</text>
  </g>

  <path d="M410 632 L410 648" stroke="#30363d" stroke-width="2"/>
  <path d="M404 644 L410 652 L416 644 Z" fill="#30363d"/>

  <!-- Stage 5 -->
  <g>
    <rect x="40" y="656" width="740" height="116" rx="12" fill="#161b22" stroke="#ff7a18" stroke-width="1.5"/>
    <circle cx="92" cy="714" r="26" fill="#ff7a18"/>
    <text x="92" y="723" text-anchor="middle" fill="#0d1117" font-size="26" font-weight="700">5</text>
    <text x="140" y="702" fill="#e6edf3" font-size="19" font-weight="700">Storyboard</text>
    <text x="140" y="730" fill="#adbac7" font-size="14.5">Per-second slices (single-shot) OR per-shot slices (multi)</text>
    <text x="140" y="752" fill="#6e7681" font-size="13" font-style="italic">Action + Camera + VFX &#183; leave the ending empty</text>
  </g>
</svg>
